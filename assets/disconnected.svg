<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">

<!-- BACKGROUND -->

<rect width="800" height="220" fill="#050505"/>


<!-- PANEL -->

<rect
x="20"
y="20"
width="760"
height="180"
rx="15"
fill="#090909"
stroke="#89C400"
stroke-width="2"/>



<!-- STATUS LIGHT -->

<circle
cx="55"
cy="60"
r="8"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0.2;1"
dur="1s"
repeatCount="indefinite"/>

</circle>



<!-- TERMINAL TITLE -->

<text
x="80"
y="67"
fill="#89C400"
font-size="24"
font-family="monospace">

EX01//NET TERMINAL v1.0

</text>



<!-- DIVIDER -->

<line
x1="45"
y1="90"
x2="750"
y2="90"
stroke="#89C400"
stroke-opacity="0.3"/>



<!-- DISCONNECT MESSAGE -->

<text
x="50"
y="130"
fill="white"
font-size="18"
font-family="monospace">

&gt; Disconnecting...

</text>



<text
x="50"
y="165"
fill="#89C400"
font-size="18"
font-family="monospace">

&gt; SESSION CLOSED

</text>



<!-- BLINK CURSOR -->

<rect
x="245"
y="150"
width="10"
height="18"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0;1"
dur="0.8s"
repeatCount="indefinite"/>

</rect>



<!-- SIGNAL -->

<text
x="690"
y="165"
fill="#555"
font-size="14"
font-family="monospace">

OFFLINE

</text>



<!-- SCAN -->

<rect
x="25"
y="25"
width="750"
height="2"
fill="#89C400"
opacity="0.15">

<animate
attributeName="y"
from="25"
to="195"
dur="3s"
repeatCount="indefinite"/>

</rect>


</svg>