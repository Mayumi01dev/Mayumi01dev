<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">

<!-- BACKGROUND -->
<rect width="800" height="300" fill="#050505"/>


<!-- PANEL -->

<rect 
x="20" 
y="20"
width="760"
height="260"
rx="15"
fill="#090909"
stroke="#89C400"
stroke-width="2"/>


<!-- HEADER -->

<text 
x="50" 
y="65"
fill="#89C400"
font-size="25"
font-family="monospace">

NETWORK_MAP

</text>


<line
x1="45"
y1="80"
x2="750"
y2="80"
stroke="#89C400"
stroke-opacity="0.3"/>



<!-- CONNECTION LINES -->

<line 
x1="220" 
y1="120"
x2="365"
y2="150"
stroke="#89C400">

<animate
attributeName="stroke-opacity"
values="0.2;1;0.2"
dur="2s"
repeatCount="indefinite"/>

</line>


<line 
x1="435" 
y1="150"
x2="580"
y2="120"
stroke="#89C400">

<animate
attributeName="stroke-opacity"
values="1;0.2;1"
dur="2s"
repeatCount="indefinite"/>

</line>


<line 
x1="400"
y1="185"
x2="400"
y2="220"
stroke="#89C400">

<animate
attributeName="stroke-opacity"
values="0.2;1;0.2"
dur="1.5s"
repeatCount="indefinite"/>

</line>



<!-- NETWORK NODES -->


<circle 
cx="200"
cy="120"
r="20"
fill="#89C400">

<animate
attributeName="r"
values="20;25;20"
dur="2s"
repeatCount="indefinite"/>

</circle>


<circle 
cx="600"
cy="120"
r="20"
fill="#89C400">

<animate
attributeName="r"
values="20;25;20"
dur="2.5s"
repeatCount="indefinite"/>

</circle>


<circle 
cx="400"
cy="240"
r="20"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0.3;1"
dur="1.8s"
repeatCount="indefinite"/>

</circle>



<!-- CORE OUTER RING -->

<circle 
cx="400"
cy="150"
r="55"
fill="none"
stroke="#89C400"
stroke-width="2"
opacity="0.5">

<animateTransform
attributeName="transform"
type="rotate"
from="0 400 150"
to="360 400 150"
dur="8s"
repeatCount="indefinite"/>

</circle>



<!-- CORE -->

<circle 
cx="400"
cy="150"
r="35"
fill="#89C400">

<animate
attributeName="r"
values="35;42;35"
dur="2s"
repeatCount="indefinite"/>

</circle>



<text 
x="400"
y="155"
text-anchor="middle"
fill="#050505"
font-family="monospace"
font-size="14">

CORE

</text>



<!-- SIGNAL PULSE -->

<circle
cx="400"
cy="150"
r="35"
fill="none"
stroke="#89C400">

<animate
attributeName="r"
from="35"
to="90"
dur="2s"
repeatCount="indefinite"/>

<animate
attributeName="opacity"
values="0.8;0"
dur="2s"
repeatCount="indefinite"/>

</circle>



<!-- SCANLINE -->

<rect
x="25"
y="25"
width="750"
height="2"
fill="#89C400"
opacity="0.15">

<animate
attributeName="y"
from="25"
to="275"
dur="3s"
repeatCount="indefinite"/>

</rect>


</svg>