<svg width="800" height="260" xmlns="http://www.w3.org/2000/svg">

<!-- BACKGROUND -->
<rect width="800" height="260" fill="#050505"/>


<!-- TERMINAL BODY -->
<rect 
x="15" 
y="15"
width="770"
height="230"
rx="15"
fill="#090909"
stroke="#89C400"
stroke-width="2"/>


<!-- HEADER STATUS LIGHT -->

<circle
cx="45"
cy="45"
r="8"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0.3;1"
dur="1s"
repeatCount="indefinite"/>

</circle>


<text 
x="70"
y="53"
fill="#89C400"
font-size="24"
font-family="monospace">

EX01//NET TERMINAL

</text>


<!-- TIME -->

<text
x="620"
y="52"
fill="#555"
font-size="14"
font-family="monospace">

07:42:21

</text>


<!-- DIVIDER -->

<line
x1="40"
y1="75"
x2="760"
y2="75"
stroke="#89C400"
stroke-opacity="0.3"/>



<!-- LOGS -->

<text
x="40"
y="115"
fill="white"
font-size="18"
font-family="monospace">

&gt; SIGNAL DETECTED_

</text>


<text
x="40"
y="150"
fill="#89C400"
font-size="18"
font-family="monospace">

&gt; USER: MAYUMI

</text>


<text
x="40"
y="185"
fill="#89C400"
font-size="18"
font-family="monospace">

&gt; CONNECTION: ONLINE

</text>



<!-- CURSOR -->

<rect
x="270"
y="169"
width="10"
height="18"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0;1"
dur="0.8s"
repeatCount="indefinite"/>

</rect>



<!-- LOADING -->

<rect
x="40"
y="215"
width="600"
height="8"
fill="#222"/>


<rect
x="40"
y="215"
width="0"
height="8"
fill="#89C400">

<animate
attributeName="width"
values="0;500;600;0"
dur="4s"
repeatCount="indefinite"/>

</rect>



<!-- SCANLINE EFFECT -->

<rect
x="20"
y="20"
width="760"
height="2"
fill="#89C400"
opacity="0.15">

<animate
attributeName="y"
from="20"
to="235"
dur="3s"
repeatCount="indefinite"/>

</rect>



</svg>