<svg width="700"
     height="420"
     viewBox="0 0 700 420"
     xmlns="http://www.w3.org/2000/svg">

<style><![CDATA[

.background{
    fill:#050505;
}

.title{
    fill:#89C400;
    font-family:monospace;
    font-size:18px;
    font-weight:bold;
}

.subtitle{
    fill:#8F8F8F;
    font-family:monospace;
    font-size:12px;
}

.log{
    fill:#A7A7A7;
    font-family:monospace;
    font-size:13px;
}

.cursor{
    fill:#89C400;
    font-family:monospace;
    font-size:18px;
    font-weight:bold;
}

]]></style>

<!-- ================= BACKGROUND ================= -->

<rect width="700"
      height="420"
      class="background"/>

<rect x="15"
      y="15"
      width="670"
      height="390"
      rx="4"
      fill="none"
      stroke="#404040"/>

<!-- ================= HEADER ================= -->

<text x="25"
      y="40"
      class="title">

EX01//NET TERMINAL

</text>

<text x="25"
      y="60"
      class="subtitle">

Secure Development Environment

</text>

<text x="525"
      y="40"
      class="subtitle">

STATUS : ONLINE

</text>

<text x="525"
      y="60"
      class="subtitle">

BUILD : v0.0.1

</text>

<line x1="20"
      y1="75"
      x2="680"
      y2="75"
      stroke="#333"/>

<!-- ================= PROGRESS BAR ================= -->

<rect x="25"
      y="95"
      width="650"
      height="16"
      rx="2"
      fill="#2B2B2B"/>

<rect x="25"
      y="95"
      width="0"
      height="16"
      rx="2"
      fill="#89C400">

<animate
attributeName="width"
values="0;30;70;120;180;250;330;430;520;600;640;650"
keyTimes="0;0.05;0.10;0.18;0.28;0.40;0.55;0.70;0.82;0.92;0.97;1"
dur="6s"
repeatCount="indefinite"/>

</rect>

<text x="25"
      y="135"
      class="subtitle">

BOOT SEQUENCE

</text>

<!-- ================= TERMINAL ================= -->

<text x="25" y="160" class="log" opacity="0">
[ BOOT ] Loading EX01 kernel...
<animate attributeName="opacity"
 values="0;1;1"
 keyTimes="0;0.12;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="185" class="log" opacity="0">
[ SYS  ] Initializing secure environment...
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.16;0.18;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="210" class="log" opacity="0">
[ SYS  ] Verifying encryption keys...
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.30;0.32;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="235" class="log" opacity="0">
[ NET  ] Connecting to remote nodes...
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.44;0.46;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="260" class="log" opacity="0">
[ NET  ] Secure tunnel established...
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.58;0.60;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="285" class="log" opacity="0">
[ AUTH ] Operator verified : MAYUMI
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.72;0.74;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<text x="25" y="310" class="log" opacity="0">
[ DONE ] Terminal ready.
<animate attributeName="opacity"
 values="0;0;1;1"
 keyTimes="0;0.86;0.88;1"
 begin="0s"
 dur="6s"
 repeatCount="indefinite"/>
</text>

<!-- ================= FOOTER ================= -->

<line x1="20"
      y1="355"
      x2="680"
      y2="355"
      stroke="#333"/>

<text x="25"
      y="385"
      class="title">

mayumi@ex01:~$

</text>

<text x="170"
      y="385"
      class="cursor">

█

<animate
attributeName="opacity"
values="1;1;0;0;1"
keyTimes="0;0.45;0.5;0.95;1"
dur="1s"
repeatCount="indefinite"/>

</text>

</svg>
