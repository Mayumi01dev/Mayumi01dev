<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">

<!-- BACKGROUND -->

<rect width="800" height="400" fill="#050505"/>


<!-- PANEL -->

<rect
x="20"
y="20"
width="760"
height="350"
rx="15"
fill="#090909"
stroke="#89C400"
stroke-width="2"/>



<!-- HEADER -->

<circle
cx="50"
cy="50"
r="8"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0.3;1"
dur="1s"
repeatCount="indefinite"/>

</circle>


<text
x="75"
y="57"
fill="#89C400"
font-size="24"
font-family="monospace">

MISSION_DATABASE

</text>


<text
x="610"
y="57"
fill="#555"
font-size="14"
font-family="monospace">

ACTIVE: 04

</text>


<!-- DIVIDER -->

<line
x1="45"
y1="80"
x2="750"
y2="80"
stroke="#89C400"
stroke-opacity="0.3"/>



<!-- MISSIONS -->


<g
font-family="monospace"
font-size="17">


<text
x="50"
y="120"
fill="#89C400">

[001] JAVASCRIPT EVOLUTION

</text>


<text
x="70"
y="145"
fill="white">

&gt; Become proficient in JavaScript.

</text>



<text
x="50"
y="185"
fill="#89C400">

[002] FRONT-END CREATION

</text>


<text
x="70"
y="210"
fill="white">

&gt; Build complete Front-end projects.

</text>



<text
x="50"
y="250"
fill="#89C400">

[003] INTERFACE 

</text>


<text
x="70"
y="275"
fill="white">

&gt; Create interfaces with personality.

</text>



<text
x="50"
y="315"
fill="#89C400">

[004] BECOME A FRONT-END DEVELOPER.

</text>


</g>



<!-- MISSION STATUS -->

<circle
cx="720"
cy="150"
r="25"
fill="none"
stroke="#89C400"
stroke-width="2">

<animateTransform
attributeName="transform"
type="rotate"
from="0 720 150"
to="360 720 150"
dur="5s"
repeatCount="indefinite"/>

</circle>


<circle
cx="720"
cy="150"
r="7"
fill="#89C400">

<animate
attributeName="opacity"
values="1;0.2;1"
dur="1s"
repeatCount="indefinite"/>

</circle>



<!-- SCAN EFFECT -->

<rect
x="25"
y="25"
width="750"
height="2"
fill="#89C400"
opacity="0.15">

<animate
attributeName="y"
from="25"
to="315"
dur="3s"
repeatCount="indefinite"/>

</rect>


</svg>
